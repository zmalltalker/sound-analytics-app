document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"357f7376-e2bc-4f81-8dfd-93abdc86e92a\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n\n<helmet>\n<style>\n  *{ box-sizing:border-box; margin:0; padding:0; }\n  body{ background:#e7e5df; -webkit-font-smoothing:antialiased; }\n  svg{ display:block; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-width:100%; min-height:100vh; width:max-content; box-sizing:border-box; padding:64px 64px 96px; background:#e7e5df; font-family:-apple-system,system-ui,'Segoe UI',Helvetica,sans-serif;\">\n<div style=\"width:1140px; max-width:1140px; display:flex; flex-direction:column; gap:34px;\">\n\n  <!-- ===== MASTHEAD ===== -->\n  <div style=\"display:flex; align-items:flex-end; justify-content:space-between; gap:40px;\">\n    <div>\n      <div style=\"font:700 13px/1 ui-monospace,Menlo,monospace; letter-spacing:.14em; color:#0a84ff; margin-bottom:14px;\">DESIGN SYSTEM · iOS<\u002Fdiv>\n      <div style=\"font:800 44px/1.02 -apple-system,system-ui; letter-spacing:-.03em; color:#17171a;\">Rich Sound Recorder<\u002Fdiv>\n      <div style=\"font:500 17px/1.5 -apple-system,system-ui; color:#73726e; margin-top:12px; max-width:640px;\">A Liquid Glass system for industrial sound intelligence. Semantic tokens, an Apple-native type ramp, and a set of custom widgets — light &amp; dark throughout. Pairs with the SwiftUI specification.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"width:104px; height:104px; border-radius:26px; background:linear-gradient(160deg,#3a9bff,#0a6fff 68%,#0a5bdd); box-shadow:0 16px 40px rgba(10,132,255,.42), inset 0 1px 0 rgba(255,255,255,.55); display:flex; align-items:center; justify-content:center; flex:none;\">\n      <div style=\"display:flex; align-items:center; gap:5px; height:48px;\"><div style=\"width:5px;height:18px;border-radius:3px;background:#fff;\"><\u002Fdiv><div style=\"width:5px;height:33px;border-radius:3px;background:#fff;\"><\u002Fdiv><div style=\"width:5px;height:48px;border-radius:3px;background:#fff;\"><\u002Fdiv><div style=\"width:5px;height:26px;border-radius:3px;background:#fff;\"><\u002Fdiv><div style=\"width:5px;height:14px;border-radius:3px;background:#fff;\"><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== PRINCIPLES ===== -->\n  <div style=\"background:#fff; border-radius:24px; padding:40px; box-shadow:0 1px 3px rgba(0,0,0,.06), 0 12px 40px rgba(0,0,0,.05);\">\n    <div style=\"font:700 12px/1 ui-monospace,Menlo,monospace; letter-spacing:.12em; color:#0a84ff; margin-bottom:7px;\">01 · PRINCIPLES<\u002Fdiv>\n    <div style=\"font:800 26px/1.1 -apple-system,system-ui; letter-spacing:-.02em; color:#17171a; margin-bottom:26px;\">Five rules that hold the system together<\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:18px;\">\n      <div style=\"border:1px solid #ecebe6; border-radius:16px; padding:22px 24px;\"><div style=\"font:700 17px/1.2 -apple-system,system-ui; color:#17171a; margin-bottom:7px;\">Glass, not chrome<\u002Fdiv><div style=\"font:500 14px/1.55 -apple-system,system-ui; color:#73726e;\">Surfaces are translucent and defer to content. Blur plus saturation lets the canvas tint through — never reach for an opaque gray panel.<\u002Fdiv><\u002Fdiv>\n      <div style=\"border:1px solid #ecebe6; border-radius:16px; padding:22px 24px;\"><div style=\"font:700 17px/1.2 -apple-system,system-ui; color:#17171a; margin-bottom:7px;\">One accent, earned<\u002Fdiv><div style=\"font:500 14px/1.55 -apple-system,system-ui; color:#73726e;\">A single brand blue carries every primary action and selection. Status hues — green, amber, red — appear only to signal state, never to decorate.<\u002Fdiv><\u002Fdiv>\n      <div style=\"border:1px solid #ecebe6; border-radius:16px; padding:22px 24px;\"><div style=\"font:700 17px/1.2 -apple-system,system-ui; color:#17171a; margin-bottom:7px;\">Light &amp; dark are equal<\u002Fdiv><div style=\"font:500 14px/1.55 -apple-system,system-ui; color:#73726e;\">Every token ships a light and a dark value. Components reference semantic tokens, so they invert automatically with the system appearance.<\u002Fdiv><\u002Fdiv>\n      <div style=\"border:1px solid #ecebe6; border-radius:16px; padding:22px 24px;\"><div style=\"font:700 17px/1.2 -apple-system,system-ui; color:#17171a; margin-bottom:7px;\">Calm hierarchy<\u002Fdiv><div style=\"font:500 14px/1.55 -apple-system,system-ui; color:#73726e;\">Type leans on weight and size, not color. Secondary text is the same hue at a lower opacity rather than a new gray.<\u002Fdiv><\u002Fdiv>\n      <div style=\"border:1px solid #ecebe6; border-radius:16px; padding:22px 24px; grid-column:1 / -1;\"><div style=\"font:700 17px/1.2 -apple-system,system-ui; color:#17171a; margin-bottom:7px;\">Depth through light<\u002Fdiv><div style=\"font:500 14px/1.55 -apple-system,system-ui; color:#73726e;\">Elevation reads from a soft drop shadow plus a one-pixel top inner highlight — the suggestion of a light source — not from heavy borders or strokes.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== COLOR ===== -->\n  <div style=\"background:#fff; border-radius:24px; padding:40px; box-shadow:0 1px 3px rgba(0,0,0,.06), 0 12px 40px rgba(0,0,0,.05);\">\n    <div style=\"font:700 12px/1 ui-monospace,Menlo,monospace; letter-spacing:.12em; color:#0a84ff; margin-bottom:7px;\">02 · COLOR<\u002Fdiv>\n    <div style=\"font:800 26px/1.1 -apple-system,system-ui; letter-spacing:-.02em; color:#17171a; margin-bottom:6px;\">Semantic tokens<\u002Fdiv>\n    <div style=\"font:500 14px/1.5 -apple-system,system-ui; color:#73726e; margin-bottom:28px; max-width:680px;\">Reference colors by role, not value. Raw hexes live in one place; screens consume <span style=\"font-family:ui-monospace,Menlo,monospace; font-size:13px; color:#0a84ff;\">accent<\u002Fspan>, <span style=\"font-family:ui-monospace,Menlo,monospace; font-size:13px; color:#0a84ff;\">label.secondary<\u002Fspan>, <span style=\"font-family:ui-monospace,Menlo,monospace; font-size:13px; color:#0a84ff;\">surface.glass<\u002Fspan>.<\u002Fdiv>\n\n    <div style=\"font:700 12px/1 -apple-system,system-ui; letter-spacing:.06em; text-transform:uppercase; color:#9b9a95; margin-bottom:14px;\">Brand &amp; accent<\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:30px;\">\n      <div><div style=\"height:80px; border-radius:14px; background:#0a84ff;\"><\u002Fdiv><div style=\"font:600 14px/1 -apple-system,system-ui; color:#17171a; margin-top:11px;\">accent<\u002Fdiv><div style=\"font:500 12px/1.4 ui-monospace,Menlo,monospace; color:#9b9a95; margin-top:4px;\">#0A84FF<\u002Fdiv><div style=\"font:500 12px/1.4 -apple-system,system-ui; color:#73726e; margin-top:5px;\">All primary action &amp; selection<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"height:80px; border-radius:14px; background:linear-gradient(180deg,#3a9bff,#0a84ff);\"><\u002Fdiv><div style=\"font:600 14px/1 -apple-system,system-ui; color:#17171a; margin-top:11px;\">accent.gradient<\u002Fdiv><div style=\"font:500 12px/1.4 ui-monospace,Menlo,monospace; color:#9b9a95; margin-top:4px;\">3A9BFF → 0A84FF<\u002Fdiv><div style=\"font:500 12px/1.4 -apple-system,system-ui; color:#73726e; margin-top:5px;\">Filled buttons, app icon<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"height:80px; border-radius:14px; background:#409cff;\"><\u002Fdiv><div style=\"font:600 14px/1 -apple-system,system-ui; color:#17171a; margin-top:11px;\">accent.onDark<\u002Fdiv><div style=\"font:500 12px/1.4 ui-monospace,Menlo,monospace; color:#9b9a95; margin-top:4px;\">#409CFF<\u002Fdiv><div style=\"font:500 12px/1.4 -apple-system,system-ui; color:#73726e; margin-top:5px;\">Accent text on dark surfaces<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"height:80px; border-radius:14px; background:rgba(10,132,255,.1); border:1px solid rgba(10,132,255,.2);\"><\u002Fdiv><div style=\"font:600 14px/1 -apple-system,system-ui; color:#17171a; margin-top:11px;\">accent.tint<\u002Fdiv><div style=\"font:500 12px/1.4 ui-monospace,Menlo,monospace; color:#9b9a95; margin-top:4px;\">accent @ 10%<\u002Fdiv><div style=\"font:500 12px/1.4 -apple-system,system-ui; color:#73726e; margin-top:5px;\">Tonal pills, selected fills<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"font:700 12px/1 -apple-system,system-ui; letter-spacing:.06em; text-transform:uppercase; color:#9b9a95; margin-bottom:14px;\">Status<\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:30px;\">\n      <div><div style=\"height:80px; border-radius:14px; background:#34c759;\"><\u002Fdiv><div style=\"font:600 14px/1 -apple-system,system-ui; color:#17171a; margin-top:11px;\">success<\u002Fdiv><div style=\"font:500 12px/1.4 ui-monospace,Menlo,monospace; color:#9b9a95; margin-top:4px;\">#34C759 / #30D158<\u002Fdiv><div style=\"font:500 12px/1.4 -apple-system,system-ui; color:#73726e; margin-top:5px;\">Ready, label has audio<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"height:80px; border-radius:14px; background:#ff9f0a;\"><\u002Fdiv><div style=\"font:600 14px/1 -apple-system,system-ui; color:#17171a; margin-top:11px;\">warning<\u002Fdiv><div style=\"font:500 12px/1.4 ui-monospace,Menlo,monospace; color:#9b9a95; margin-top:4px;\">#FF9F0A<\u002Fdiv><div style=\"font:500 12px/1.4 -apple-system,system-ui; color:#73726e; margin-top:5px;\">Needs audio, attention<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"height:80px; border-radius:14px; background:#ff3b30;\"><\u002Fdiv><div style=\"font:600 14px/1 -apple-system,system-ui; color:#17171a; margin-top:11px;\">danger<\u002Fdiv><div style=\"font:500 12px/1.4 ui-monospace,Menlo,monospace; color:#9b9a95; margin-top:4px;\">#FF3B30 / #FF453A<\u002Fdiv><div style=\"font:500 12px/1.4 -apple-system,system-ui; color:#73726e; margin-top:5px;\">Record dot, stop, destructive<\u002Fdiv><\u002Fdiv>\n s with the reader’s <b style=\"color:#17171a;\">Text Size<\u002Fb> setting — the pixel sizes below are the <b style=\"color:#17171a;\">Large<\u002Fb> default. Hierarchy comes from weight and tracking; tabular figures everywhere numbers move.<\u002Fdiv>\n    <div style=\"display:flex; flex-direction:column;\">\n      <div style=\"display:flex; align-items:baseline; gap:24px; padding:18px 0; border-top:1px solid #ecebe6;\"><div style=\"width:200px; flex:none;\"><div style=\"font:700 13px/1 -apple-system,system-ui; color:#17171a;\">display<\u002Fdiv><div style=\"font:500 12px/1.4 ui-monospace,Menlo,monospace; color:#9b9a95; margin-top:4px;\">Ultralight 200 · 70<\u002Fdiv><\u002Fdiv><div style=\"font:200 70px/1 -apple-system,system-ui; letter-spacing:-.03em; color:#0b0b0f; font-variant-numeric:tabular-nums;\">0:09<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex; align-items:baseline; gap:24px; padding:18px 0; border-top:1px solid #ecebe6;\"><div style=\"width:200px; flex:none;\"><div style=\"font:700 13px/1 -apple-system,system-ui; color:#17171a;\">largeTitle<\u002Fdiv><div style=\"font:500 12px/1.4 ui-monospace,Menlo,monospace; color:#9b9a95; margin-top:4px;\">Heavy 800 · 34 · -.03em<\u002Fdiv><\u002Fdiv><div style=\"font:800 34px/1 -apple-system,system-ui; letter-spacing:-.03em; color:#0b0b0f;\">Detect<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex; align-items:baseline; gap:24px; padding:18px 0; border-top:1px solid #ecebe6;\"><div style=\"width:200px; flex:none;\"><div style=\"font:700 13px/1 -apple-system,system-ui; color:#17171a;\">title<\u002Fdiv><div style=\"font:500 12px/1.4 ui-monospace,Menlo,monospace; color:#9b9a95; margin-top:4px;\">Bold 700 · 18–27<\u002Fdiv><\u002Fdiv><div style=\"font:700 22px/1 -apple-system,system-ui; letter-spacing:-.01em; color:#0b0b0f;\">Ready to train<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex; align-items:baseline; gap:24px; padding:18px 0; border-top:1px solid #ecebe6;\"><div style=\"width:200px; flex:none;\"><div style=\"font:700 13px/1 -apple-system,system-ui; color:#17171a;\">headline<\u002Fdiv><div style=\"font:500 12px/1.4 ui-monospace,Menlo,monospace; color:#9b9a95; margin-top:4px;\">Semibold 600 · 17<\u002Fdiv><\u002Fdiv><div style=\"font:600 17px/1 -apple-system,system-ui; color:#0b0b0f;\">Stop &amp; analyze<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex; align-items:baseline; gap:24px; padding:18px 0; border-top:1px solid #ecebe6;\"><div style=\"width:200px; flex:none;\"><div style=\"font:700 13px/1 -apple-system,system-ui; color:#17171a;\">body<\u002Fdiv><div style=\"font:500 12px/1.4 ui-monospace,Menlo,monospace; color:#9b9a95; margin-top:4px;\">Medium 500 · 15<\u002Fdiv><\u002Fdiv><div style=\"font:500 15px/1 -apple-system,system-ui; color:#0b0b0f;\">Compressor Line A<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex; align-items:baseline; gap:24px; padding:18px 0; border-top:1px solid #ecebe6;\"><div style=\"width:200px; flex:none;\"><div style=\"font:700 13px/1 -apple-system,system-ui; color:#17171a;\">subhead<\u002Fdiv><div style=\"font:500 12px/1.4 ui-monospace,Menlo,monospace; color:#9b9a95; margin-top:4px;\">Medium 500 · 13<\u002Fdiv><\u002Fdiv><div style=\"font:500 13px/1 -apple-system,system-ui; color:rgba(60,60,67,.6);\">Default · 4 labels · on device<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex; align-items:baseline; gap:24px; padding:18px 0; border-top:1px solid #ecebe6;\"><div style=\"width:200px; flex:none;\"><div style=\"font:700 13px/1 -apple-system,system-ui; color:#17171a;\">caption<\u002Fdiv><div style=\"font:500 12px/1.4 ui-monospace,Menlo,monospace; color:#9b9a95; margin-top:4px;\">Semibold 600 · 10–12<\u002Fdiv><\u002Fdiv><div style=\"font:600 11px/1 -apple-system,system-ui; letter-spacing:.04em; text-transform:uppercase; color:rgba(10,132,255,.85);\">Listening<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex; align-items:baseline; gap:24px; padding:18px 0; border-top:1px solid #ecebe6;\"><div style=\"width:200px; flex:none;\"><div style=\"font:700 13px/1 -apple-system,system-ui; color:#17171a;\">mono.meta<\u002Fdiv><div style=\"font:500 12px/1.4 ui-monospace,Menlo,monospace; color:#9b9a95; margin-top:4px;\">ui-monospace · 12<\u002Fdiv><\u002Fdiv><div style=\"font:600 13px/1 ui-monospace,Menlo,monospace; letter-spacing:.04em; color:#73726e;\">48 kHz · MONO · AAC<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== DYNAMIC TYPE ===== -->\n  <div style=\"background:#fff; border-radius:24px; padding:40px; box-shadow:0 1px 3px rgba(0,0,0,.06), 0 12px 40px rgba(0,0,0,.05);\">\n    <div style=\"font:700 12px/1 ui-monospace,Menlo,monospace; letter-spacing:.12em; color:#0a84ff; margin-bottom:7px;\">03 · TYPOGRAPHY — DYNAMIC TYPE<\u002Fdiv>\n    <div style=\"font:800 26px/1.1 -apple-system,system-ui; letter-spacing:-.02em; color:#17171a; margin-bottom:6px;\">Type scales with the reader<\u002Fdiv>\n    <div style=\"font:500 14px/1.5 -apple-system,system-ui; color:#73726e; margin-bottom:28px; max-width:720px;\">Every role maps to a SwiftUI text style, so it grows and shrinks with the system <b style=\"color:#17171a;\">Text Size<\u002Fb> setting — across seven standard steps and five Accessibility sizes (<span style=\"font-family:ui-monospace,Menlo,monospace; font-size:13px; color:#0a84ff;\">AX1–AX5<\u002Fspan>). The one custom size — the timer — uses <span style=\"font-family:ui-monospace,Menlo,monospace; font-size:13px; color:#0a84ff;\">@ScaledMetric<\u002Fspan>. The system supports the full range; it is never disabled.<\u002Fdiv>\n\n    <!-- mapping table -->\n    <div style=\"border:1px solid #ecebe6; border-radius:16px; overflow:hidden; margin-bottom:30px;\">\n      <div style=\"display:grid; grid-template-columns:1.1fr 1.7fr .65fr .65fr 1.7fr; gap:16px; padding:14px 22px; background:#f6f8fb; border-bottom:1px solid #ecebe6;\">\n        <div style=\"font:700 11px/1 -apple-system,system-ui; letter-spacing:.05em; text-transform:uppercase; color:#9b9a95;\">Role<\u002Fdiv>\n        <div style=\"font:700 11px/1 -apple-system,system-ui; letter-spacing:.05em; text-transform:uppercase; color:#9b9a95;\">SwiftUI text style<\u002Fdiv>\n        <div style=\"font:700 11px/1 -apple-system,system-ui; letter-spacing:.05em; text-transform:uppercase; color:#9b9a95; text-align:right;\">Large<\u002Fdiv>\n        <div style=\"font:700 11px/1 -apple-system,system-ui; letter-spacing:.05em; text-transform:uppercase; color:#9b9a95; text-align:right;\">AX5<\u002Fdiv>\n        <div style=\"font:700 11px/1 -apple-system,system-ui; letter-spacing:.05em; text-transform:uppercase; color:#9b9a95;\">Behavior<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:4px 22px 10px;\">\n        <div style=\"display:grid; grid-template-columns:1.1fr 1.7fr .65fr .65fr 1.7fr; gap:16px; align-items:center; padding:13px 0; border-bottom:1px solid #ecebe6;\"><div style=\"font:700 14px/1 -apple-system,system-ui; color:#17171a;\">display<\u002Fdiv><div style=\"font:600 13px/1.3 ui-monospace,Menlo,monospace; color:#0a84ff;\">@ScaledMetric(.largeTitle)<\u002Fdiv><div style=\"font:600 13px/1 ui-monospace,Menlo,monospace; color:#17171a; text-align:right;\">70<\u002Fdiv><div style=\"font:600 13px/1 ui-monospace,Menlo,monospace; color:#73726e; text-align:right;\">~96<\u002Fdiv><div style=\"font:500 13px/1.4 -apple-system,system-ui; color:#73726e;\">Capped — keeps the timer on one line<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:1.1fr 1.7fr .65fr .65fr 1.7fr; gap:16px; align-items:center; padding:13px 0; border-bottom:1px solid #ecebe6;\"><div style=\"font:700 14px/1 -apple-system,system-ui; color:#17171a;\">largeTitle<\u002Fdiv><div style=\"font:600 13px/1.3 ui-monospace,Menlo,monospace; color:#0a84ff;\">.largeTitle<\u002Fdiv><div style=\"font:600 13px/1 ui-monospace,Menlo,monospace; color:#17171a; text-align:right;\">34<\u002Fdiv><div style=\"font:600 13px/1 ui-monospace,Menlo,monospace; color:#73726e; text-align:right;\">44<\u002Fdiv><div style=\"font:500 13px/1.4 -apple-system,system-ui; color:#73726e;\">Grows freely<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:1.1fr 1.7fr .65fr .65fr 1.7fr; gap:16px; align-items:center; padding:13px 0; border-bottom:1px solid #ecebe6;\"><div style=\"font:700 14px/1 -apple-system,system-ui; color:#17171a;\">title<\u002Fdiv><div style=\"font:600 13px/1.3 ui-monospace,Menlo,monospace; color:#0a84ff;\">.title2<\u002Fdiv><div style=\"font:600 13px/1 ui-monospace,Menlo,monospace; color:#17171a; text-align:right;\">22<\u002Fdiv><div style=\"font:600 13px/1 ui-monospace,Menlo,monospace; color:#73726e; text-align:right;\">34<\u002Fdiv><div style=\"font:500 13px/1.4 -apple-system,system-ui; color:#73726e;\">Grows freely<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:1.1fr 1.7fr .65fr .65fr 1.7fr; gap:16px; align-items:center; padding:13px 0; border-bottom:1px solid #ecebe6;\"><div style=\"font:700 14px/1 -apple-system,system-ui; color:#17171a;\">headline<\u002Fdiv><div style=\"font:600 13px/1.3 ui-monospace,Menlo,monospace; color:#0a84ff;\">.headline<\u002Fdiv><div style=\"font:600 13px/1 ui-monospace,Menlo,monospace; color:#17171a; text-align:right;\">17<\u002Fdiv><div style=\"font:600 13px/1 ui-monospace,Menlo,monospace; color:#73726e; text-align:right;\">28<\u002Fdiv><div style=\"font:500 13px/1.4 -apple-system,system-ui; color:#73726e;\">Grows freely<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:1.1fr 1.7fr .65fr .65fr 1.7fr; gap:16px; align-items:center; padding:13px 0; border-bottom:1px solid #ecebe6;\"><div style=\"font:700 14px/1 -apple-system,system-ui; color:#17171a;\">body<\u002Fdiv><div style=\"font:600 13px/1.3 ui-monospace,Menlo,monospace; color:#0a84ff;\">.subheadline<\u002Fdiv><div style=\"font:600 13px/1 ui-monospace,Menlo,monospace; color:#17171a; text-align:right;\">15<\u002Fdiv><div style=\"font:600 13px/1 ui-monospace,Menlo,monospace; color:#73726e; text-align:right;\">25<\u002Fdiv><div style=\"font:500 13px/1.4 -apple-system,system-ui; color:#73726e;\">Grows, wraps to multi-line<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:1.1fr 1.7fr .65fr .65fr 1.7fr; gap:16px; align-items:center; padding:13px 0; border-bottom:1px solid #ecebe6;\"><div style=\"font:700 14px/1 -apple-system,system-ui; color:#17171a;\">subhead<\u002Fdiv><div style=\"font:600 13px/1.3 ui-monospace,Menlo,monospace; color:#0a84ff;\">.footnote<\u002Fdiv><div style=\"font:600 13px/1 ui-monospace,Menlo,monospace; color:#17171a; text-align:right;\">13<\u002Fdiv><div style=\"font:600 13px/1 ui-monospace,Menlo,monospace; color:#73726e; text-align:right;\">23<\u002Fdiv><div style=\"font:500 13px/1.4 -apple-system,system-ui; color:#73726e;\">Grows, wraps to multi-line<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:1.1fr 1.7fr .65fr .65fr 1.7fr; gap:16px; align-items:center; padding:13px 0; border-bottom:1px solid #ecebe6;\"><div style=\"font:700 14px/1 -apple-system,system-ui; color:#17171a;\">caption<\u002Fdiv><div style=\"font:600 13px/1.3 ui-monospace,Menlo,monospace; color:#0a84ff;\">.caption2<\u002Fdiv><div style=\"font:600 13px/1 ui-monospace,Menlo,monospace; color:#17171a; text-align:right;\">11<\u002Fdiv><div style=\"font:600 13px/1 ui-monospace,Menlo,monospace; color:#73726e; text-align:right;\">22<\u002Fdiv><div style=\"font:500 13px/1.4 -apple-system,system-ui; color:#73726e;\">Grows freely<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:1.1fr 1.7fr .65fr .65fr 1.7fr; gap:16px; align-items:center; padding:13px 0;\"><div style=\"font:700 14px/1 -apple-system,system-ui; color:#17171a;\">mono.meta<\u002Fdiv><div style=\"font:600 13px/1.3 ui-monospace,Menlo,monospace; color:#0a84ff;\">.footnote · monospaced<\u002Fdiv><div style=\"font:600 13px/1 ui-monospace,Menlo,monospace; color:#17171a; text-align:right;\">13<\u002Fdiv><div style=\"font:600 13px/1 ui-monospace,Menlo,monospace; color:#73726e; text-align:right;\">23<\u002Fdiv><div style=\"font:500 13px/1.4 -apple-system,system-ui; color:#73726e;\">Grows; tabular figures kept<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- behavior rules -->\n    <div style=\"font:700 12px/1 -apple-system,system-ui; letter-spacing:.06em; text-transform:uppercase; color:#9b9a95; margin-bottom:14px;\">How components respond<\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:18px; margin-bottom:18px;\">\n      <div style=\"border:1px solid #ecebe6; border-radius:16px; padding:22px 24px;\"><div style=\"font:700 15px/1.2 -apple-system,system-ui; color:#0a84ff; margin-bottom:8px;\">Grow the container<\u002Fdiv><div style=\"font:500 13px/1.55 -apple-system,system-ui; color:#73726e;\">Controls size to their label. Use a <b style=\"color:#17171a;\">44pt min-height<\u002Fb> floor — never a fixed height. The 54pt button, 66pt tab bar and list rows all expand upward as text grows.<\u002Fdiv><\u002Fdiv>\n      <div style=\"border:1px solid #ecebe6; border-radius:16px; padding:22px 24px;\"><div style=\"font:700 15px/1.2 -apple-system,system-ui; color:#0a84ff; margin-bottom:8px;\">Wrap, never clip<\u002Fdiv><div style=\"font:500 13px/1.55 -apple-system,system-ui; color:#73726e;\">Label and project names wrap to a second line before they truncate. Trailing meters and counts move <b style=\"color:#17171a;\">below<\u002Fb> the name rather than squeezing it.<\u002Fdiv><\u002Fdiv>\n      <div style=\"border:1px solid #ecebe6; border-radius:16px; padding:22px 24px;\"><div style=\"font:700 15px/1.2 -apple-system,system-ui; color:#0a84ff; margin-bottom:8px;\">Reflow at AX sizes<\u002Fdiv><div style=\"font:500 13px/1.55 -apple-system,system-ui; color:#73726e;\">Above AX1, horizontal rows (name + meter + count) stack vertically, and tab-bar labels hide to leave icon-only targets — matching iOS’s own behavior.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; align-items:flex-start; gap:11px; padding:16px 18px; border-radius:14px; background:rgba(10,132,255,.07);\">\n      <div style=\"width:18px; height:18px; border-radius:9px; background:#0a84ff; color:#fff; font:700 12px/18px -apple-system,system-ui; text-align:center; flex:none;\">i<\u002Fdiv>\n      <div style=\"font:500 13px/1.55 -apple-system,system-ui; color:#73726e;\">Verify every screen at the two largest Accessibility sizes (<span style=\"font-family:ui-monospace,Menlo,monospace; font-size:12px; color:#0a84ff;\">AX4<\u002Fspan>/<span style=\"font-family:ui-monospace,Menlo,monospace; font-size:12px; color:#0a84ff;\">AX5<\u002Fspan>) before shipping. SwiftUI previews with <span style=\"font-family:ui-monospace,Menlo,monospace; font-size:12px; color:#0a84ff;\">.dynamicTypeSize(.accessibility5)<\u002Fspan> catch clipping and truncation early.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== SPACING / RADII / ELEVATION ===== -->\n  <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:34px;\">\n    <div style=\"background:#fff; border-radius:24px; padding:40px; box-shadow:0 1px 3px rgba(0,0,0,.06), 0 12px 40px rgba(0,0,0,.05);\">\n      <div style=\"font:700 12px/1 ui-monospace,Menlo,monospace; letter-spacing:.12em; color:#0a84ff; margin-bottom:7px;\">04 · SHAPE<\u002Fdiv>\n      <div style=\"font:800 22px/1.1 -apple-system,system-ui; letter-spacing:-.02em; color:#17171a; margin-bottom:22px;\">Radius &amp; spacing<\u002Fdiv>\n      <div style=\"display:flex; align-items:flex-end; gap:16px; margin-bottom:26px;\">\n        <div style=\"text-align:center;\"><div style=\"width:56px;height:56px;background:rgba(10,132,255,.12); border:1.5px solid #0a84ff; border-radius:10px;\"><\u002Fdiv><div style=\"font:600 12px/1 -apple-system,system-ui; color:#17171a; margin-top:9px;\">tile<\u002Fdiv><div style=\"font:500 11px/1 ui-monospace,Menlo,monospace; color:#9b9a95; margin-top:3px;\">10<\u002Fdiv><\u002Fdiv>\n        <div style=\"text-align:center;\"><div style=\"width:56px;height:56px;background:rgba(10,132,255,.12); border:1.5px solid #0a84ff; border-radius:13px;\"><\u002Fdiv><div style=\"font:600 12px/1 -apple-system,system-ui; color:#17171a; margin-top:9px;\">chip<\u002Fdiv><div style=\"font:500 11px/1 ui-monospace,Menlo,monospace; color:#9b9a95; margin-top:3px;\">13<\u002Fdiv><\u002Fdiv>\n        <div style=\"text-align:center;\"><div style=\"width:56px;height:56px;background:rgba(10,132,255,.12); border:1.5px solid #0a84ff; border-radius:18px;\"><\u002Fdiv><div style=\"font:600 12px/1 -apple-system,system-ui; color:#17171a; margin-top:9px;\">control<\u002Fdiv><div style=\"font:500 11px/1 ui-monospace,Menlo,monospace; color:#9b9a95; margin-top:3px;\">18<\u002Fdiv><\u002Fdiv>\n        <div style=\"text-align:center;\"><div style=\"width:56px;height:56px;background:rgba(10,132,255,.12); border:1.5px solid #0a84ff; border-radius:22px;\"><\u002Fdiv><div style=\"font:600 12px/1 -apple-system,system-ui; color:#17171a; margin-top:9px;\">card<\u002Fdiv><div style=\"font:500 11px/1 ui-monospace,Menlo,monospace; color:#9b9a95; margin-top:3px;\">22<\u002Fdiv><\u002Fdiv>\n        <div style=\"text-align:center;\"><div style=\"width:56px;height:56px;background:rgba(10,132,255,.12); border:1.5px solid #0a84ff; border-radius:28px;\"><\u002Fdiv><div style=\"font:600 12px/1 -apple-system,system-ui; color:#17171a; margin-top:9px;\">sheet<\u002Fdiv><div style=\"font:500 11px/1 ui-monospace,Menlo,monospace; color:#9b9a95; margin-top:3px;\">26–33<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font:500 13px/1.6 -apple-system,system-ui; color:#73726e;\">Spacing steps in 4s. Screen margin <b style=\"color:#17171a;\">22<\u002Fb>, card padding <b style=\"color:#17171a;\">16–18<\u002Fb>, stack gap <b style=\"color:#17171a;\">14<\u002Fb>, tight gap <b style=\"color:#17171a;\">11<\u002Fb>. Hit targets never below <b style=\"color:#17171a;\">44<\u002Fb>.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff; border-radius:24px; padding:40px; box-shadow:0 1px 3px rgba(0,0,0,.06), 0 12px 40px rgba(0,0,0,.05);\">\n      <div style=\"font:700 12px/1 ui-monospace,Menlo,monospace; letter-spacing:.12em; color:#0a84ff; margin-bottom:7px;\">05 · ELEVATION<\u002Fdiv>\n      <div style=\"font:800 22px/1.1 -apple-system,system-ui; letter-spacing:-.02em; color:#17171a; margin-bottom:6px;\">Light, not borders<\u002Fdiv>\n      <div style=\"font:500 13px/1.5 -apple-system,system-ui; color:#73726e; margin-bottom:24px;\">Each level = a soft ambient shadow + a 1px top inner highlight.<\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:16px;\">\n        <div style=\"display:flex; align-items:center; gap:16px;\"><div style=\"width:90px;height:48px;border-radius:14px;background:#fff;box-shadow:0 4px 14px rgba(17,24,39,.06), inset 0 1px 0 rgba(255,255,255,.7); flex:none;\"><\u002Fdiv><div><div style=\"font:600 14px/1 -apple-system,system-ui; color:#17171a;\">e1 · resting<\u002Fdiv><div style=\"font:500 12px/1.4 ui-monospace,Menlo,monospace; color:#9b9a95; margin-top:4px;\">0 4px 14px /.06<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:16px;\"><div style=\"width:90px;height:48px;border-radius:14px;background:#fff;box-shadow:0 10px 30px rgba(17,24,39,.08), inset 0 1px 0 rgba(255,255,255,.7); flex:none;\"><\u002Fdiv><div><div style=\"font:600 14px/1 -apple-system,system-ui; color:#17171a;\">e2 · card<\u002Fdiv><div style=\"font:500 12px/1.4 ui-monospace,Menlo,monospace; color:#9b9a95; margin-top:4px;\">0 10px 30px /.08<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:16px;\"><div style=\"width:90px;height:48px;border-radius:14px;background:linear-gradient(180deg,#3a9bff,#0a84ff);box-shadow:0 8px 22px rgba(10,132,255,.4), inset 0 1px 0 rgba(255,255,255,.45); flex:none;\"><\u002Fdiv><div><div style=\"font:600 14px/1 -apple-system,system-ui; color:#17171a;\">e3 · accent lift<\u002Fdiv><div style=\"font:500 12px/1.4 ui-monospace,Menlo,monospace; color:#9b9a95; margin-top:4px;\">0 8px 22px accent/.4<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:16px;\"><div style=\"width:90px;height:48px;border-radius:14px;background:#fff;box-shadow:0 30px 60px rgba(0,0,0,.28); flex:none;\"><\u002Fdiv><div><div style=\"font:600 14px/1 -apple-system,system-ui; color:#17171a;\">e4 · floating<\u002Fdiv><div style=\"font:500 12px/1.4 ui-monospace,Menlo,monospace; color:#9b9a95; margin-top:4px;\">tab bar, device<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== MATERIALS ===== -->\n  <div style=\"background:#fff; border-radius:24px; padding:40px; box-shadow:0 1px 3px rgba(0,0,0,.06), 0 12px 40px rgba(0,0,0,.05);\">\n    <div style=\"font:700 12px/1 ui-monospace,Menlo,monospace; letter-spacing:.12em; color:#0a84ff; margin-bottom:7px;\">06 · MATERIALS<\u002Fdiv>\n    <div style=\"font:800 26px/1.1 -apple-system,system-ui; letter-spacing:-.02em; color:#17171a; margin-bottom:6px;\">The glass recipe<\u002Fdiv>\n    <div style=\"font:500 14px/1.5 -apple-system,system-ui; color:#73726e; margin-bottom:26px; max-width:700px;\">Every surface is the same construction: a translucent fill, a heavy backdrop blur with boosted saturation, a hairline border, and an inner top highlight. Three blur weights cover the system.<\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:20px;\">\n      <div style=\"position:relative; border-radius:18px; overflow:hidden; padding:24px; background:radial-gradient(120% 100% at 20% 0%, #3a9bff, #0a5bdd 70%, #5e5ce6);\">\n        <div style=\"position:absolute; top:14px; left:16px; right:16px; height:40px; border-radius:12px; background:rgba(255,255,255,.5);\"><\u002Fdiv>\n        <div style=\"position:relative; border-radius:16px; padding:18px; background:rgba(255,255,255,.66); -webkit-backdrop-filter:blur(28px) saturate(180%); backdrop-filter:blur(28px) saturate(180%); border:.5px solid rgba(255,255,255,.85); box-shadow:0 10px 30px rgba(17,24,39,.12), inset 0 1px 0 rgba(255,255,255,.7); margin-top:30px;\">\n          <div style=\"font:700 15px/1 -apple-system,system-ui; color:#0b0b0f;\">material.regular · light<\u002Fdiv>\n          <div style=\"font:500 12px/1.5 ui-monospace,Menlo,monospace; color:rgba(60,60,67,.7); margin-top:8px;\">fill rgba(255,255,255,.66)<br>blur 28 · saturate 180%<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative; border-radius:18px; overflow:hidden; padding:24px; background:radial-gradient(120% 100% at 20% 0%, #1c4a8a, #06122a 70%, #2a2752);\">\n        <div style=\"position:absolute; top:14px; left:16px; right:16px; height:40px; border-radius:12px; background:rgba(120,160,255,.4);\"><\u002Fdiv>\n        <div style=\"position:relative; border-radius:16px; padding:18px; background:rgba(30,31,36,.6); -webkit-backdrop-filter:blur(28px) saturate(160%); backdrop-filter:blur(28px) saturate(160%); border:.5px solid rgba(255,255,255,.1); box-shadow:0 14px 36px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.06); margin-top:30px;\">\n          <div style=\"font:700 15px/1 -apple-system,system-ui; color:#fff;\">material.regular · dark<\u002Fdiv>\n          <div style=\"font:500 12px/1.5 ui-monospace,Menlo,monospace; color:rgba(235,235,245,.6); margin-top:8px;\">fill rgba(30,31,36,.6)<br>blur 28 · saturate 160%<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:24px; margin-top:18px; flex-wrap:wrap;\">\n      <div style=\"font:500 13px/1.5 -apple-system,system-ui; color:#73726e; flex:1; min-width:200px;\"><b style=\"color:#17171a;\">thin · blur 20<\u002Fb><br>Buttons, inline chips, list rows.<\u002Fdiv>\n      <div style=\"font:500 13px/1.5 -apple-system,system-ui; color:#73726e; flex:1; min-width:200px;\"><b style=\"color:#17171a;\">regular · blur 28<\u002Fb><br>Cards, model rows, sheets.<\u002Fdiv>\n      <div style=\"font:500 13px/1.5 -apple-system,system-ui; color:#73726e; flex:1; min-width:200px;\"><b style=\"color:#17171a;\">thick · blur 34<\u002Fb><br>The floating tab bar only.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== COMPONENTS HEADER ===== -->\n  <div style=\"padding:18px 4px 0;\">\n    <div style=\"font:700 13px/1 ui-monospace,Menlo,monospace; letter-spacing:.14em; color:#0a84ff; margin-bottom:10px;\">07 · COMPONENTS<\u002Fdiv>\n    <div style=\"font:800 32px/1.05 -apple-system,system-ui; letter-spacing:-.025em; color:#17171a;\">Custom widgets &amp; their rules<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- BUTTONS -->\n  <div style=\"background:#fff; border-radius:24px; padding:40px; box-shadow:0 1px 3px rgba(0,0,0,.06), 0 12px 40px rgba(0,0,0,.05);\">\n    <div style=\"font:800 22px/1.1 -apple-system,system-ui; letter-spacing:-.02em; color:#17171a; margin-bottom:22px;\">Buttons<\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:26px;\">\n      <div style=\"border-radius:18px; padding:26px; background:linear-gradient(180deg,#f6f8fb,#eceff4); display:flex; flex-direction:column; gap:13px;\">\n        <div style=\"height:54px; border-radius:18px; background:linear-gradient(180deg,#3a9bff,#0a84ff); box-shadow:0 8px 22px rgba(10,132,255,.4), inset 0 1px 0 rgba(255,255,255,.45); border:.5px solid rgba(255,255,255,.4); display:flex; align-items:center; justify-content:center;\"><span style=\"font:600 17px/1 -apple-system,system-ui; color:#fff;\">Start training<\u002Fspan><\u002Fdiv>\n        <div style=\"height:54px; border-radius:18px; background:rgba(255,255,255,.7); -webkit-backdrop-filter:blur(20px) saturate(180%); backdrop-filter:blur(20px) saturate(180%); border:.5px solid rgba(255,255,255,.85); box-shadow:0 4px 14px rgba(17,24,39,.06), inset 0 1px 0 rgba(255,255,255,.7); display:flex; align-items:center; justify-content:center; gap:9px;\"><div style=\"width:11px;height:11px;border-radius:6px;background:#ff3b30;\"><\u002Fdiv><span style=\"font:600 17px/1 -apple-system,system-ui; color:#0a84ff;\">Record audio<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; gap:10px;\"><div style=\"font:600 15px/1 -apple-system,system-ui; color:#0a84ff; padding:9px 14px; border-radius:13px; background:rgba(10,132,255,.1);\">Switch<\u002Fdiv><div style=\"font:600 15px/1 -apple-system,system-ui; color:#0a84ff; padding:9px 14px; border-radius:13px; background:rgba(10,132,255,.1);\">Manage<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-radius:18px; padding:26px; background:linear-gradient(180deg,#0a0b0d,#000); display:flex; flex-direction:column; gap:13px;\">\n        <div style=\"height:54px; border-radius:18px; background:linear-gradient(180deg,#3a9bff,#0a84ff); box-shadow:0 8px 26px rgba(10,132,255,.5), inset 0 1px 0 rgba(255,255,255,.45); border:.5px solid rgba(255,255,255,.35); display:flex; align-items:center; justify-content:center;\"><span style=\"font:600 17px/1 -apple-system,system-ui; color:#fff;\">Start training<\u002Fspan><\u002Fdiv>\n        <div style=\"height:54px; border-radius:18px; background:rgba(40,41,46,.7); -webkit-backdrop-filter:blur(20px) saturate(160%); backdrop-filter:blur(20px) saturate(160%); border:.5px solid rgba(255,255,255,.1); box-shadow:0 4px 14px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.07); display:flex; align-items:center; justify-content:center; gap:9px;\"><div style=\"width:11px;height:11px;border-radius:6px;background:#ff453a;\"><\u002Fdiv><span style=\"font:600 17px/1 -apple-system,system-ui; color:#0a84ff;\">Record audio<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; gap:10px;\"><div style=\"font:600 15px/1 -apple-system,system-ui; color:#0a84ff; padding:9px 14px; border-radius:13px; background:rgba(10,132,255,.18);\">Switch<\u002Fdiv><div style=\"height:38px; border-radius:18px; background:rgba(255,255,255,.06); border:.5px solid rgba(255,255,255,.12); flex:1; display:flex; align-items:center; justify-content:center; gap:8px;\"><div style=\"width:14px;height:14px;border-radius:4px;background:#ff453a;\"><\u002Fdiv><span style=\"font:600 14px/1 -apple-system,system-ui; color:#fff;\">Stop &amp; analyze<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:18px;\">\n      <div><div style=\"font:700 14px/1 -apple-system,system-ui; color:#0a84ff; margin-bottom:6px;\">Primary<\u002Fdiv><div style=\"font:500 13px/1.5 -apple-system,system-ui; color:#73726e;\">Accent gradient, one per screen, the main forward action. 54h · r18 · label 17/600.<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font:700 14px/1 -apple-system,system-ui; color:#0a84ff; margin-bottom:6px;\">Secondary<\u002Fdiv><div style=\"font:500 13px/1.5 -apple-system,system-ui; color:#73726e;\">Glass fill, accent label. Parallel actions that sit beside a primary.<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font:700 14px/1 -apple-system,system-ui; color:#0a84ff; margin-bottom:6px;\">Tonal pill<\u002Fdiv><div style=\"font:500 13px/1.5 -apple-system,system-ui; color:#73726e;\">Accent text on 10% tint, r13. Inline utilities — Switch, Manage.<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font:700 14px/1 -apple-system,system-ui; color:#0a84ff; margin-bottom:6px;\">Destructive<\u002Fdiv><div style=\"font:500 13px/1.5 -apple-system,system-ui; color:#73726e;\">A red dot/square inside a normal button — not a red fill, except the final stop.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- WAVEFORMS -->\n  <div style=\"background:#fff; border-radius:24px; padding:40px; box-shadow:0 1px 3px rgba(0,0,0,.06), 0 12px 40px rgba(0,0,0,.05);\">\n    <div style=\"font:800 22px/1.1 -apple-system,system-ui; letter-spacing:-.02em; color:#17171a; margin-bottom:6px;\">Waveforms<\u002Fdiv>\n    <div style=\"font:500 14px/1.5 -apple-system,system-ui; color:#73726e; margin-bottom:24px; max-width:720px;\">One procedural generator drives every waveform — bars under a sine envelope (loudest in the middle). Screens vary only count, amplitude, bar width, and color.<\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1.3fr 1fr; gap:20px; margin-bottom:24px;\">\n      <div style=\"border-radius:18px; padding:28px; background:linear-gradient(180deg,#f6f8fb,#eceff4);\">\n        <div style=\"font:600 12px/1 -apple-system,system-ui; letter-spacing:.04em; text-transform:uppercase; color:rgba(10,132,255,.85); margin-bottom:14px;\">Hero · live<\u002Fdiv>\n        <div style=\"height:140px; display:flex; align-items:center;\">{{ wfHero }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-radius:18px; padding:28px; background:linear-gradient(180deg,#0a0b0d,#000);\">\n        <div style=\"font:600 12px/1 -apple-system,system-ui; letter-spacing:.04em; text-transform:uppercase; color:#409cff; margin-bottom:14px;\">Hero · dark<\u002Fdiv>\n        <div style=\"height:140px; display:flex; align-items:center;\">{{ wfHeroDark }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:22px;\">\n      <div style=\"border-radius:18px; padding:22px; background:linear-gradient(180deg,#f6f8fb,#eceff4);\">\n        <div style=\"font:600 13px/1 -apple-system,system-ui; color:#17171a; margin-bottom:12px;\">Inline · capture review<\u002Fdiv>\n        <div style=\"position:relative; height:80px; border-radius:12px; overflow:hidden; background:rgba(120,144,180,.06);\"><div style=\"position:absolute; top:0; bottom:0; left:24%; width:14%; background:rgba(10,132,255,.14); border-left:1.5px solid rgba(10,132,255,.5); border-right:1.5px solid rgba(10,132,255,.5);\"><\u002Fdiv><div style=\"position:absolute; top:0; bottom:0; left:62%; width:18%; background:rgba(10,132,255,.14); border-left:1.5px solid rgba(10,132,255,.5);\"><\u002Fdiv><div style=\"position:absolute; inset:0; display:flex; align-items:center;\">{{ wfInline }}<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-radius:18px; padding:22px; background:linear-gradient(180deg,#f6f8fb,#eceff4);\">\n        <div style=\"font:600 13px/1 -apple-system,system-ui; color:#17171a; margin-bottom:12px;\">Muted · passive<\u002Fdiv>\n        <div style=\"height:80px; display:flex; align-items:center;\">{{ wfMuted }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:18px;\">\n      <div><div style=\"font:700 14px/1 -apple-system,system-ui; color:#0a84ff; margin-bottom:6px;\">Envelope<\u002Fdiv><div style=\"font:500 13px/1.5 -apple-system,system-ui; color:#73726e;\">A fixed sine curve shapes amplitude so every waveform reads as sound, not noise.<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font:700 14px/1 -apple-system,system-ui; color:#0a84ff; margin-bottom:6px;\">Color = state<\u002Fdiv><div style=\"font:500 13px/1.5 -apple-system,system-ui; color:#73726e;\">Accent when live or selected; muted blue-gray when passive. Region overlays mark detected events.<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font:700 14px/1 -apple-system,system-ui; color:#0a84ff; margin-bottom:6px;\">Never decoration<\u002Fdiv><div style=\"font:500 13px/1.5 -apple-system,system-ui; color:#73726e;\">A waveform implies audio. Don't place one on a screen with nothing to play.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- PROJECT SELECTOR -->\n  <div style=\"background:#fff; border-radius:24px; padding:40px; box-shadow:0 1px 3px rgba(0,0,0,.06), 0 12px 40px rgba(0,0,0,.05);\">\n    <div style=\"font:800 22px/1.1 -apple-system,system-ui; letter-spacing:-.02em; color:#17171a; margin-bottom:6px;\">Project selector<\u002Fdiv>\n    <div style=\"font:500 14px/1.5 -apple-system,system-ui; color:#73726e; margin-bottom:24px; max-width:720px;\">The active project is always visible and one tap from switching. Two forms share one switcher.<\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px;\">\n      <div style=\"border-radius:18px; padding:24px; background:linear-gradient(180deg,#f6f8fb,#eceff4);\">\n        <div style=\"font:600 12px/1 -apple-system,system-ui; color:#9b9a95; margin-bottom:13px;\">FULL · home &amp; Train<\u002Fdiv>\n        <div style=\"display:flex; align-items:center; justify-content:space-between; padding:10px 12px 10px 14px; border-radius:18px; background:rgba(255,255,255,.66); -webkit-backdrop-filter:blur(28px) saturate(180%); backdrop-filter:blur(28px) saturate(180%); border:.5px solid rgba(255,255,255,.85); box-shadow:0 6px 18px rgba(17,24,39,.07), inset 0 1px 0 rgba(255,255,255,.7);\">\n          <div style=\"display:flex; align-items:center; gap:11px;\"><div style=\"width:34px;height:34px;border-radius:10px;background:linear-gradient(160deg,#3a9bff,#0a6fff); display:flex;align-items:center;justify-content:center;\"><div style=\"display:flex; align-items:center; gap:2px; height:15px;\"><div style=\"width:2.4px;height:7px;border-radius:2px;background:#fff;\"><\u002Fdiv><div style=\"width:2.4px;height:15px;border-radius:2px;background:#fff;\"><\u002Fdiv><div style=\"width:2.4px;height:9px;border-radius:2px;background:#fff;\"><\u002Fdiv><\u002Fdiv><\u002Fdiv><div><div style=\"font:600 15px/1.15 -apple-system,system-ui; color:#0b0b0f;\">Compressor Line A<\u002Fdiv><div style=\"font:500 12px/1.15 -apple-system,system-ui; color:rgba(60,60,67,.55);\">Active project<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"font:600 15px/1 -apple-system,system-ui; color:#0a84ff; padding:8px 12px; border-radius:13px; background:rgba(10,132,255,.1);\">Switch<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-radius:18px; padding:24px; background:linear-gradient(180deg,#0a0b0d,#000);\">\n        <div style=\"font:600 12px/1 -apple-system,system-ui; color:#73726e; margin-bottom:13px;\">COMPACT · app bar chip<\u002Fdiv>\n        <div style=\"display:flex;\"><div style=\"display:flex; align-items:center; gap:6px; padding:8px 12px; border-radius:15px; background:rgba(30,31,36,.6); -webkit-backdrop-filter:blur(20px); backdrop-filter:blur(20px); border:.5px solid rgba(255,255,255,.1); box-shadow:inset 0 1px 0 rgba(255,255,255,.06);\"><span style=\"font:600 14px/1 -apple-system,system-ui; color:#fff;\">Compressor Line A<\u002Fspan><svg width=\"8\" height=\"13\" viewBox=\"0 0 9 15\" fill=\"none\"><path d=\"M1.5 1.5l6 6-6 6\" stroke=\"rgba(235,235,245,.4)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:18px;\">\n      <div><div style=\"font:700 14px/1 -apple-system,system-ui; color:#0a84ff; margin-bottom:6px;\">Gradient glyph tile<\u002Fdiv><div style=\"font:500 13px/1.5 -apple-system,system-ui; color:#73726e;\">A 34px accent tile with a mini waveform marks every project.<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font:700 14px/1 -apple-system,system-ui; color:#0a84ff; margin-bottom:6px;\">Name + role<\u002Fdiv><div style=\"font:500 13px/1.5 -apple-system,system-ui; color:#73726e;\">Project name in body, \"Active project\" beneath in label.secondary.<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font:700 14px/1 -apple-system,system-ui; color:#0a84ff; margin-bottom:6px;\">One switcher<\u002Fdiv><div style=\"font:500 13px/1.5 -apple-system,system-ui; color:#73726e;\">Full pill and compact chip both open the same sheet.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- LABELS -->\n  <div style=\"background:#fff; border-radius:24px; padding:40px; box-shadow:0 1px 3px rgba(0,0,0,.06), 0 12px 40px rgba(0,0,0,.05);\">\n    <div style=\"font:800 22px/1.1 -apple-system,system-ui; letter-spacing:-.02em; color:#17171a; margin-bottom:6px;\">Labels<\u002Fdiv>\n    <div style=\"font:500 14px/1.5 -apple-system,system-ui; color:#73726e; margin-bottom:24px; max-width:720px;\">A label row is a status dot, a name, and a readiness signal — either a clip-count meter or a state tag. The dot color encodes readiness.<\u002Fdiv>\n    <div style=\"border-radius:18px; padding:20px 24px; background:linear-gradient(180deg,#f6f8fb,#eceff4); margin-bottom:24px;\">\n      <div style=\"display:flex; align-items:center; gap:12px; padding:9px 0;\"><div style=\"width:8px;height:8px;border-radius:4px;background:#34c759;\"><\u002Fdiv><div style=\"flex:1; font:600 15px/1 -apple-system,system-ui; color:#0b0b0f;\">Bearing fault<\u002Fdiv><div style=\"width:64px;height:6px;border-radius:3px;background:rgba(120,144,180,.2);\"><div style=\"width:100%;height:6px;border-radius:3px;background:#0a84ff;\"><\u002Fdiv><\u002Fdiv><div style=\"font:600 13px/1 -apple-system,system-ui; color:rgba(60,60,67,.6); width:30px; text-align:right;\">24<\u002Fdiv><\u002Fdiv>\n      <div style=\"height:.5px; background:rgba(60,60,67,.12);\"><\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:12px; padding:9px 0;\"><div style=\"width:8px;height:8px;border-radius:4px;background:#34c759;\"><\u002Fdiv><div style=\"flex:1; font:600 15px/1 -apple-system,system-ui; color:#0b0b0f;\">Cavitation<\u002Fdiv><div style=\"width:64px;height:6px;border-radius:3px;background:rgba(120,144,180,.2);\"><div style=\"width:26%;height:6px;border-radius:3px;background:#0a84ff;\"><\u002Fdiv><\u002Fdiv><div style=\"font:600 13px/1 -apple-system,system-ui; color:rgba(60,60,67,.6); width:30px; text-align:right;\">6<\u002Fdiv><\u002Fdiv>\n      <div style=\"height:.5px; background:rgba(60,60,67,.12);\"><\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:12px; padding:9px 0;\"><div style=\"width:8px;height:8px;border-radius:4px;background:#ff9f0a;\"><\u002Fdiv><div style=\"flex:1; font:600 15px/1 -apple-system,system-ui; color:#0b0b0f;\">Impeller wear<\u002Fdiv><div style=\"font:600 13px/1 -apple-system,system-ui; color:#ff9f0a;\">Needs audio<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:18px;\">\n      <div><div style=\"font:700 14px/1 -apple-system,system-ui; color:#34c759; margin-bottom:6px;\">● Green — ready<\u002Fdiv><div style=\"font:500 13px/1.5 -apple-system,system-ui; color:#73726e;\">Label has enough audio to train. Show the clip count.<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font:700 14px/1 -apple-system,system-ui; color:#ff9f0a; margin-bottom:6px;\">● Amber — needs audio<\u002Fdiv><div style=\"font:500 13px/1.5 -apple-system,system-ui; color:#73726e;\">Replace the meter with a \"Needs audio\" tag in warning.<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font:700 14px/1 -apple-system,system-ui; color:#ff3b30; margin-bottom:6px;\">● Red — error<\u002Fdiv><div style=\"font:500 13px/1.5 -apple-system,system-ui; color:#73726e;\">Reserved for failures. Counts stay tabular and right-aligned.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- TAB BAR -->\n  <div style=\"background:#fff; border-radius:24px; padding:40px; box-shadow:0 1px 3px rgba(0,0,0,.06), 0 12px 40px rgba(0,0,0,.05);\">\n    <div style=\"font:800 22px/1.1 -apple-system,system-ui; letter-spacing:-.02em; color:#17171a; margin-bottom:6px;\">Tab bar<\u002Fdiv>\n    <div style=\"font:500 14px/1.5 -apple-system,system-ui; color:#73726e; margin-bottom:24px; max-width:720px;\">A floating glass island, inset from the screen edges — the system's only thick-blur surface. Four destinations, persistent across the workspace.<\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px;\">\n      <div style=\"border-radius:18px; padding:30px 24px; background:linear-gradient(180deg,#f6f8fb,#eceff4);\">\n        <div style=\"height:66px; border-radius:33px; background:rgba(255,255,255,.62); -webkit-backdrop-filter:blur(34px) saturate(180%); backdrop-filter:blur(34px) saturate(180% \n  <div style=\"display:flex; align-items:center; justify-content:space-between; padding:8px 6px 0;\">\n    <div style=\"font:500 13px/1.5 -apple-system,system-ui; color:#9b9a95;\">Rich Sound Recorder · iOS Design System · pairs with the SwiftUI specification (<span style=\"font-family:ui-monospace,Menlo,monospace;\">/SwiftUI<\u002Fspan>)<\u002Fdiv>\n    <div style=\"font:600 12px/1 ui-monospace,Menlo,monospace; letter-spacing:.06em; color:#0a84ff;\">v1.0<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  n(i, s) { const x = Math.sin(i * 12.9898 + s * 78.233) * 43758.5453; return x - Math.floor(x); }\n  wave(count, amp, seed) {\n    const a = [];\n    for (let i = 0; i < count; i++) {\n      const t = i / (count - 1);\n      const env = 0.30 + 0.70 * Math.pow(Math.sin(Math.PI * t), 0.7);\n      a.push(Math.max(5, Math.round((0.16 + 0.84 * this.n(i, seed)) * amp * env)));\n    }\n    return a;\n  }\n  buildWave(arr, color, bw, gap) {\n    return React.createElement('div', {\n      style: { display: 'flex', alignItems: 'center', justifyContent: 'center', gap: (gap || 3) + 'px', height: '100%', width: '100%' }\n    }, arr.map((h, i) => React.createElement('div', {\n      key: i,\n      style: { width: bw + 'px', height: h + 'px', borderRadius: '3px', background: color, flex: '0 0 auto' }\n    })));\n  }\n  renderVals() {\n    return {\n      wfHero: this.buildWave(this.wave(48, 132, 11), '#0a84ff', 3, 3.4),\n      wfHeroDark: this.buildWave(this.wave(48, 132, 11), '#409cff', 3, 3.4),\n      wfInline: this.buildWave(this.wave(60, 64, 4), 'rgba(10,132,255,.9)', 2.4, 2.1),\n      wfMuted: this.buildWave(this.wave(48, 60, 7), 'rgba(120,144,180,.5)', 3, 3.4)\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
