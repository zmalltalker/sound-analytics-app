			shellPath = /bin/sh;
			shellScript = " # Generate dSYMs for SPM frameworks (MSAL)\n  if [ \"${CONFIGURATION}\" = \"Release\" ]; then\n    echo \"Generating dSYMs for frameworks...\"\n\n    # Find all frameworks in the build directory\n    FRAMEWORKS_DIR=\"${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}\"\n\n    if [ -d \"$FRAMEWORKS_DIR\" ]; then\n      find \"$FRAMEWORKS_DIR\" -name \"*.framework\" -type d | while read FRAMEWORK; do\n        FRAMEWORK_NAME=$(basename \"$FRAMEWORK\" .framework)\n        echo \"Processing $FRAMEWORK_NAME...\"\n\n        # Generate dSYM if it doesn't exist\n        if [ ! -d \"${DWARF_DSYM_FOLDER_PATH}/${FRAMEWORK_NAME}.framework.dSYM\" ]; then\n          dsymutil \"${FRAMEWORK}/${FRAMEWORK_NAME}\" -o \"${DWARF_DSYM_FOLDER_PATH}/${FRAMEWORK_NAME}.framework.dSYM\"\n        fi\n      done\n    fi\n  fi\n";
		};
